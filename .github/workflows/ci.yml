name: Video KYC CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Backend health check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ap-south-1
        run: |
          cd backend
          node -e "
            const { DynamoDBClient, ListTablesCommand } = require('@aws-sdk/client-dynamodb');
            const client = new DynamoDBClient({ region: 'ap-south-1' });
            client.send(new ListTablesCommand({})).then(r => {
              console.log('DynamoDB OK:', r.TableNames);
              process.exit(0);
            }).catch(e => {
              console.error('DynamoDB FAILED:', e.message);
              process.exit(1);
            });
          "

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 (placeholder)
        run: |
          echo "EC2 deployment will be configured when instance is running."
          echo "Steps will include:"
          echo "  1. SSH into EC2"
          echo "  2. git pull"
          echo "  3. npm install"
          echo "  4. pm2 restart"
